<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión – SportClub</title>
  <link rel="stylesheet" href="CSS/styles.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f4f2f8;
    }

    .login-container {
      display: flex;
      width: 900px;
      height: 550px;
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }

    .login-image {
      flex: 1;
      background: linear-gradient(rgba(46, 26, 71, 0.7), rgba(46, 26, 71, 0.7)), url('img/gim4.jpg');
      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      padding: 40px;
      text-align: center;
    }

    .login-image h2 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    .login-form-side {
      flex: 1;
      padding: 50px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .auth-logo {
      height: 60px;
      margin-bottom: 20px;
      align-self: center;
    }

    .login-form-side h1 {
      font-size: 2.2rem;
      color: var(--purple-dark);
      margin-bottom: 10px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: var(--text-muted);
      margin-bottom: 30px;
    }

    .form-group input {
      width: 100%;
      padding: 14px;
      border: 2px solid #eee;
      border-radius: 12px;
      font-size: 1rem;
      transition: all 0.3s;
      background: #fdfdfd;
    }

    .form-group input:focus {
      border-color: var(--purple-dark);
      background: white;
      box-shadow: 0 5px 15px rgba(46, 26, 71, 0.1);
      outline: none;
    }

    .btn-login-submit {
      width: 100%;
      padding: 15px;
      background-color: var(--purple-dark);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }

    .btn-login-submit:hover {
      background-color: var(--purple-mid);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(46, 26, 71, 0.2);
    }

    .auth-links {
      margin-top: 25px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .auth-links a {
      text-decoration: none;
      color: var(--text-muted);
      font-size: 0.9rem;
      transition: color 0.3s;
    }

    .auth-links a:hover {
      color: var(--purple-dark);
    }

    .auth-links strong {
      color: var(--purple-dark);
    }

    @media (max-width: 850px) {
      .login-image { display: none; }
      .login-container { width: 400px; height: auto; }
    }
  </style>
</head>
<body>

  <div class="login-container">
    
    <div class="login-image">
      <h2>¡HOLA!</h2>
      <p>Es un excelente día para superar tus límites. Tu comunidad te está esperando.</p>
    </div>

    <div class="login-form-side">
      <img src="logo_empresa_letra_v1.png" alt="SportClub" class="auth-logo">
      <h1>Bienvenido</h1>
      <p class="subtitle">Ingresa tus credenciales para continuar</p>

      <form onsubmit="return handleLogin(event)">
        <div class="form-group" style="margin-bottom: 15px;">
          <input type="email" id="email" placeholder="Correo electrónico" required>
        </div>

        <div class="form-group" style="margin-bottom: 25px;">
          <input type="password" id="password" placeholder="Contraseña" required>
        </div>

        <button type="submit" class="btn-login-submit">INGRESAR</button>
      </form>

      <div class="auth-links">
        <a href="recover.html">¿Olvidaste tu contraseña?</a>
        <a href="register.html">¿No tienes cuenta? <strong>Regístrate gratis</strong></a>
        <a href="index.html" style="margin-top:10px; font-weight:700;">← Volver al inicio</a>
      </div>
    </div>

  </div>

  <script>
    function handleLogin(event) {
      event.preventDefault();
      
      const email = document.getElementById('email').value.toLowerCase();
      let destino = 'dashboard-user.html';

      if (email === 'carlosr@coach.com') {
        destino = 'dashboard-coach.html';
      } else if (email.endsWith('@admin.com')) {
        destino = 'dashboard-admin.html';
      }

      window.location.href = destino;
      return false;
    }
  </script>

</body>
</html>
