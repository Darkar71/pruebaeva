<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Contraseña – SportClub</title>
  <link rel="stylesheet" href="CSS/styles.css">
</head>
<body class="centered-page">

  <div class="auth-card">
    <img src="logo_empresa_letra_v1.png" alt="SportClub" class="auth-logo">
    <h1>Recuperar Contraseña</h1>
    <p class="subtitle">Te enviaremos un enlace a tu correo</p>

    <div class="alert success" id="successMsg">
      ✅ ¡Correo enviado! Revisa tu bandeja de entrada.
    </div>

    <form id="recoverForm" onsubmit="return handleRecover(event)">

      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" placeholder="tu@correo.com" required>
      </div>

      <button type="submit" class="btn-primary">Enviar enlace</button>
    </form>

    <hr class="divider">

    <div class="auth-links">
      <a href="login.html">← Volver al inicio de sesión</a>
    </div>
  </div>

  <script>
    document.getElementById('successMsg').style.display = 'none';

    function handleRecover(e) {
      e.preventDefault();
      document.getElementById('recoverForm').style.display = 'none';
      document.getElementById('successMsg').style.display = 'block';
      return false;
    }
  </script>

</body>
</html>
